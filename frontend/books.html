<!DOCTYPE html>
<html>

<head>

<title>Books</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<h2>Add Book</h2>

<form id="bookForm">

<input
type="text"
id="title"
placeholder="Book Title"
required>

<br><br>

<input
type="text"
id="author"
placeholder="Author"
required>

<br><br>

<input
type="text"
id="category"
placeholder="Category"
required>

<br><br>

<input
type="text"
id="isbn"
placeholder="ISBN"
required>

<br><br>

<input
type="number"
id="quantity"
placeholder="Quantity"
required>

<br><br>

<input
type="text"
id="shelfNo"
placeholder="Shelf Number"
required>

<br><br>

<button type="submit">

Add Book

</button>

</form>

<hr>
<h2>Search Book</h2>

<input
type="text"
id="search"
placeholder="Search by Title, Author, Category or ISBN">

<button onclick="searchBook()">
Search
</button>

<button onclick="loadBooks()">
Reset
</button>

<hr>

<h2>Books List</h2>

<table border="1">

<thead>

<tr>

<th>ID</th>

<th>Title</th>

<th>Author</th>

<th>Category</th>

<th>Quantity</th>

<th>Available</th>

<th>Actions</th>

</tr>

</thead>

<tbody id="bookTable">

</tbody>

</table>

<script src="js/books.js"></script>

</body>

</html>
