<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>Student Management</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<h2>Student Management</h2>

<input
type="text"
id="search"
placeholder="Search Student">

<button onclick="searchStudent()">

Search

</button>

<form id="studentForm">

<input
type="text"
id="name"
placeholder="Name"
required>

<input
type="email"
id="email"
placeholder="Email"
required>

<input
type="password"
id="password"
placeholder="Password"
required>

<input
type="text"
id="phone"
placeholder="Phone"
required>

<input
type="text"
id="department"
placeholder="Department"
required>

<input
type="number"
id="year"
placeholder="Year"
required>

<button type="submit">

Save Student

</button>

</form>

<br>

<table border="1">

<thead>

<tr>

<th>ID</th>

<th>Name</th>

<th>Email</th>

<th>Phone</th>

<th>Department</th>

<th>Year</th>

<th>Action</th>

</tr>

</thead>

<tbody id="studentTable">

</tbody>

</table>

<script src="js/students.js"></script>

</body>

</html>
